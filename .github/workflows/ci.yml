name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: core/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: core

      - name: Run vet
        run: cd core && go vet ./...

      - name: Run tests with race detector
        run: cd core && go test -race ./...

  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: sim/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: sim

      - name: Run vet
        run: cd sim && go vet ./...

      - name: Run tests with race detector
        run: cd sim && go test -race ./...

  game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev libasound2-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: game/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: game

      - name: Run vet
        run: cd game && go vet ./...

      - name: Run tests with race detector
        run: cd game && go test -race ./...
