name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [core, sim, game]
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (game)
        if: matrix.module == 'game'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev libasound2-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.module }}

      - name: Run vet
        run: cd ${{ matrix.module }} && go vet ./...

      - name: Run tests with race detector
        run: cd ${{ matrix.module }} && go test -race ./...
